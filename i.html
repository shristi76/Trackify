<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main>
    <nav>
        <div class="left"><h3>Trackify</h3>
            <h5>Track Your Work Flow</h5>
        </div>
        <div class="right">
            <button id="toggle-modal">Add Task</button>
        </div>
    </nav>

    <section class="board">
        <div id="todo" class="task-col">
            <div class="heading">
                <div>To Do</div>
                <div class="right">0</div>
            </div>
        </div>

        <div id="progress" class="task-col">
            <div class="heading">
                <div>In Progress</div>
                <div class="right">0</div>
            </div>
        </div>

        <div id="done" class="task-col">
            <div class="heading">
                <div>Completed</div>
                <div class="right">0</div>
            </div>
        </div>
    </section>
</main>

<!-- Modal -->
<div class="modal">
    <div class="bg"></div>
    <div class="center">
        <input id="task-title-input" type="text" placeholder="Task Title">
        <textarea id="task-description-input" placeholder="Task Description"></textarea>
        <button id="add-new-task">Add Task</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
